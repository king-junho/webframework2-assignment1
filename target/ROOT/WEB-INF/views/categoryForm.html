<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Category Management</title>
    <style>
        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 {
            border-bottom: 2px solid #4a90d9;
            padding-bottom: 10px;
            color: #2c3e50;
        }
        .form-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }
        .field-error {
            display: block;
            margin-top: 8px;
            color: #e74c3c;
            font-size: 0.95em;
        }
        .btn-group {
            margin-top: 24px;
        }
        .btn-submit {
            display: inline-block;
            padding: 10px 18px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 8px;
        }
        .btn-submit:hover {
            background: #357abd;
        }
        .btn-secondary {
            display: inline-block;
            padding: 10px 18px;
            background: #ecf0f1;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid #d0d7de;
        }
        .btn-secondary:hover {
            background: #dde4e6;
        }
        .helper-text {
            margin-top: 6px;
            color: #777;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<div class="form-card">
    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">카테고리 이름</label>
            <input type="text" th:field="*{name}" placeholder="예: 전자제품, 도서, 생활용품">
            <span class="field-error" th:errors="*{name}">카테고리 이름 오류</span>
            <div class="helper-text">최대 50자까지 입력할 수 있습니다.</div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-submit">등록</button>
            <a th:href="@{/categories}" class="btn-secondary">목록으로</a>
        </div>
    </form>
</div>

<footer style="margin-top:40px; padding-top:16px; border-top:1px solid #ddd; color:#666; font-size:0.95em;">
    <p th:text="${'실습 수행 일시 : ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번 : 2071011 | 성명 : 김준호'}">
        실습 수행 일시
    </p>
</footer>

</body>
</html>

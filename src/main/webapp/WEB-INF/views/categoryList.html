<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
</head>
<body>
<h1>카테고리 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red"></p>

<a th:href="@{/categories/create}">카테고리 등록</a>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>이름</th>
    <th>삭제</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="category : ${categories}">
    <td th:text="${category.id}"></td>
    <td th:text="${category.name}"></td>
    <td>
      <form th:action="@{/categories/{id}/delete(id=${category.id})})" method="post">
        <button type="submit">삭제</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<hr>
<p th:text="${'실습 수행 일시 : ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')+ ' | 학번 : 2071011 | 성명 : 김준호'}">

</body>
</html>
